name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          if [ -f leaderboard.html ] && [ -f leaderboard.json ]; then
            cp leaderboard.html public/index.html
            cp leaderboard.json public/leaderboard.json
          else
            cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>CauliBench Leaderboard</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  background: #101312;
                  color: #edf5ef;
                  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }
                main {
                  width: min(720px, calc(100% - 32px));
                  border: 1px solid #2f3b35;
                  border-radius: 8px;
                  background: #171c1a;
                  padding: 28px;
                }
                h1 { margin: 0 0 12px; }
                p { color: #a7b5ac; line-height: 1.6; }
                code {
                  color: #7ad66d;
                  background: #1d2421;
                  border-radius: 6px;
                  padding: 2px 6px;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>🥦 CauliBench Leaderboard</h1>
                <p>No generated leaderboard has been published yet.</p>
                <p>Run <code>npm run caulibench</code>, commit the generated leaderboard data, then push to <code>main</code>.</p>
              </main>
            </body>
          </html>
          HTML
            cat > public/leaderboard.json <<'JSON'
          {
            "generated_at": "",
            "benchmark_mode": "full",
            "entries": []
          }
          JSON
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
